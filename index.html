<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>우리 반 관리 홈페이지</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>📚 우리 반 관리 홈페이지</h1>
    <p>학생 정보를 등록해보세요!</p>
  </header>

  <main>

    <section class="form-section">
      <h2>학생 등록</h2>

      <input type="text" id="studentName" placeholder="학생 이름">

      <textarea id="studentText" placeholder="학생 소개 또는 메모"></textarea>

      <input type="file" id="studentImage" accept="image/*">

      <button onclick="addStudent()">등록하기</button>
    </section>

    <section>
      <h2>학생 목록</h2>
      <div id="studentList" class="student-list"></div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
