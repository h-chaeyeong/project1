<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 반 알림장 & 앨범</title>
    <style>
        /* 전체 페이지 스타일 */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* 헤더 스타일 (칠판 느낌) */
        header {
            background-color: #2e5a44;
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
        }

        header p {
            margin: 0.5rem 0 0 0;
            opacity: 0.9;
        }

        /* 메인 컨테이너 레이아웃 */
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* 섹션 공통 스타일 */
        .section-box {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 {
            border-bottom: 3px solid #2e5a44;
            padding-bottom: 0.5rem;
            color: #2e5a44;
            margin-top: 0;
        }

        /* 입력 폼 스타일 */
        .input-group {
            margin-bottom: 1rem;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        input[type="file"] {
            display: none;
        }

        .file-label {
            display: inline-block;
            background-color: #e0e0e0;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .file-label:hover {
            background-color: #d0d0d0;
        }

        button {
            background-color: #2e5a44;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            font-weight: bold;
        }

        button:hover {
            background-color: #1f3e2e;
        }

        /* 리스트 스타일 (글방) */
        .post-list {
            margin-top: 1.5rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .post-item {
            background: #f9f9f9;
            border-left: 5px solid #2e5a44;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 0 6px 6px 0;
        }

        .post-item h4 {
            margin: 0 0 0.5rem 0;
            color: #1f3e2e;
        }

        .post-item p {
            margin: 0;
            white-space: pre-line;
            font-size: 0.95rem;
        }

        /* 그리드 스타일 (사진첩) */
        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .photo-item {
            position: relative;
            padding-bottom: 100%; /* 1:1 정사각형 비율 */
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .photo-item img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .photo-item img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- 헤더 -->
    <header>
        <h1>배움과 성장이 있는 우리 반</h1>
        <p>선생님과 학생들이 함께 만들어가는 공간입니다.</p>
    </header>

    <!-- 메인 컨텐츠 -->
    <div class="container">
       
        <!-- 왼쪽: 글쓰기 (자유게시판/알림장) -->
        <div class="section-box">
            <h2>📝 우리 반 글방</h2>
            <div class="input-group">
                <input type="text" id="postTitle" placeholder="제목을 입력하세요">
            </div>
            <div class="input-group">
                <textarea id="postContent" placeholder="여기에 내용을 작성해 주세요..."></textarea>
            </div>
            <button onclick="addPost()">등록하기</button>

            <div class="post-list" id="postList">
                <!-- 작성된 글이 여기에 추가됩니다 -->
                <div class="post-item">
                    <h4>📌 환영합니다!</h4>
                    <p>우리 반 홈페이지가 개설되었습니다. 자유롭게 글을 남겨주세요.</p>
                </div>
            </div>
        </div>

        <!-- 오른쪽: 사진 업로드 (추억 앨범) -->
        <div class="section-box">
            <h2>📷 추억 앨범</h2>
            <div class="input-group" style="text-align: center;">
                <label for="photoInput" class="file-label">📁 사진 선택하기</label>
                <input type="file" id="photoInput" accept="image/*" onchange="previewAndAddPhoto()">
                <div id="fileName" style="font-size: 0.85rem; color: #666;">선택된 파일 없음</div>
            </div>

            <div class="photo-gallery" id="photoGallery">
                <!-- 업로드된 사진이 여기에 추가됩니다 -->
            </div>
        </div>

    </div>

    <!-- 기능 구현 JavaScript -->
    <script>
        // 1. 글쓰기 기능
        function addPost() {
            const titleInput = document.getElementById('postTitle');
            const contentInput = document.getElementById('postContent');
            const postList = document.getElementById('postList');

            if (!titleInput.value.trim() || !contentInput.value.trim()) {
                alert('제목과 내용을 모두 입력해주세요!');
                return;
            }

            // 새로운 글 요소 생성
            const postItem = document.createElement('div');
            postItem.className = 'post-item';

            const postTitle = document.createElement('h4');
            postTitle.textContent = titleInput.value;

            const postContent = document.createElement('p');
            postContent.textContent = contentInput.value;

            // 조립 및 추가
            postItem.appendChild(postTitle);
            postItem.appendChild(postContent);
           
            // 최신 글이 맨 위로 오도록 추가
            postList.insertBefore(postItem, postList.firstChild);

            // 입력창 초기화
            titleInput.value = '';
            contentInput.value = '';
        }

        // 2. 사진 업로드 및 표시 기능
        function previewAndAddPhoto() {
            const fileInput = document.getElementById('photoInput');
            const fileNameDisplay = document.getElementById('fileName');
            const gallery = document.getElementById('photoGallery');
           
            const file = fileInput.files[0];

            if (file) {
                fileNameDisplay.textContent = file.name;

                // 파일을 브라우저에서 읽기 위한 FileReader 객체 사용
                const reader = new FileReader();
               
                reader.onload = function(e) {
                    // 사진 아이템 구조 생성
                    const photoItem = document.createElement('div');
                    photoItem.className = 'photo-item';

                    const img = document.createElement('img');
                    img.src = e.target.result; // 읽어온 이미지 데이터 주소
                    img.alt = '학급 사진';

                    photoItem.appendChild(img);
                   
                    // 최신 사진이 맨 앞에 오도록 추가
                    gallery.insertBefore(photoItem, gallery.firstChild);
                }

                reader.readAsDataURL(file);
            } else {
                fileNameDisplay.textContent = '선택된 파일 없음';
            }
        }
    </script>
</body>
</html>
